<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chalkboard — Display</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@400;600;700&family=Shadows+Into+Light&family=Permanent+Marker&family=Gochi+Hand&family=Architects+Daughter&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#board-frame{width:100vw;height:100vh;padding:16px;}
#board-frame.chalk{background:linear-gradient(135deg,#5a3a20,#3d2814);}
#board-frame.white{background:linear-gradient(135deg,#c8ccd0,#9aa0a6);}
#board-surface{width:100%;height:100%;border-radius:8px;position:relative;overflow:hidden;}
#board-surface.chalk{background:#1f3d2e;background-image:radial-gradient(circle at 20% 30%,rgba(255,255,255,.03) 0%,transparent 8%),radial-gradient(circle at 70% 60%,rgba(255,255,255,.025) 0%,transparent 10%),radial-gradient(circle at 40% 80%,rgba(255,255,255,.02) 0%,transparent 6%);box-shadow:inset 0 0 100px rgba(0,0,0,.5);}
#board-surface.white{background:#fafafa;background-image:linear-gradient(rgba(0,0,0,.015) 1px,transparent 1px);background-size:100% 42px;box-shadow:inset 0 0 50px rgba(0,0,0,.08);}
#board-notes-area{position:relative;width:100%;height:100%;}
.board-note{position:absolute;overflow:hidden;}
.board-note-inner{width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;}
.board-note-text{white-space:pre-wrap;word-wrap:break-word;line-height:1.35;}
.board-note.chalk .board-note-text{color:#fff;text-shadow:0 0 1px rgba(255,255,255,.5),0 0 8px rgba(255,255,255,.15);}
.board-note.white .board-note-text{text-shadow:0 1px 0 rgba(0,0,0,.06);}
.board-note-img{max-width:100%;border-radius:4px;display:block;}
.board-empty{color:rgba(255,255,255,.3);font-family:sans-serif;font-size:20px;letter-spacing:1px;text-align:center;padding:60px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;}
#board-surface.white .board-empty{color:rgba(0,0,0,.25);}
#live-dot{position:fixed;top:10px;right:14px;width:8px;height:8px;border-radius:50%;background:#5CCC88;box-shadow:0 0 6px #5CCC88;opacity:.6;}
</style>
</head>
<body>

<div id="board-frame" class="chalk">
  <div id="board-surface" class="chalk">
    <div id="board-notes-area"></div>
  </div>
</div>
<div id="live-dot" title="Live -- updates automatically when the board changes"></div>
<div id="app-ver-badge" style="position:fixed;bottom:6px;right:8px;z-index:99999;font-family:sans-serif;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.35);pointer-events:none;">V3</div>

<script>
const CB_KEY='jag_chalkboard_v1';
let CB={ boardStyle:'chalk', font:'Kalam', notes:[] };

function loadCB(){
  try{
    const raw=localStorage.getItem(CB_KEY);
    if(raw){ const d=JSON.parse(raw); CB=Object.assign(CB,d); if(!Array.isArray(CB.notes))CB.notes=[]; }
  }catch(e){}
}
function escapeHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}
function noteFontStyle(n){
  const font=n.font||CB.font;
  const decos=[];
  if(n.underline)decos.push('underline');
  if(n.strike)decos.push('line-through');
  return `font-family:'${font}',cursive;font-size:${n.fontSize||28}px;color:${n.color};`
    +(n.bold?'font-weight:700;':'')
    +(n.italic?'font-style:italic;':'')
    +(decos.length?`text-decoration:${decos.join(' ')};`:'');
}
function render(){
  document.getElementById('board-frame').className=CB.boardStyle;
  document.getElementById('board-surface').className=CB.boardStyle;
  const area=document.getElementById('board-notes-area');
  if(!CB.notes.length){
    area.innerHTML='<div class="board-empty">Nothing on the board right now.</div>';
    return;
  }
  area.innerHTML=CB.notes.map(n=>{
    const w=n.w||22, h=n.h||20, x=n.x||0, y=n.y||0;
    const body=n.type==='image'
      ? `<img class="board-note-img" src="${escapeHtml(n.imgUrl)}" alt="" style="flex:1;min-height:0;width:100%;object-fit:contain;"/>${n.text?`<div class="board-note-text" style="${noteFontStyle(n)}margin-top:6px;text-align:center;flex-shrink:0;">${escapeHtml(n.text)}</div>`:''}`
      : `<div class="board-note-text" style="${noteFontStyle(n)}">${escapeHtml(n.text)}</div>`;
    return `<div class="board-note ${CB.boardStyle}" style="left:${x}%;top:${y}%;width:${w}%;height:${h}%;">
      <div class="board-note-inner">${body}</div>
    </div>`;
  }).join('');
}

loadCB();
render();

// Push updates: whenever the editing window (or any other tab) changes the board
// data, this window picks it up automatically -- no manual refresh needed.
window.addEventListener('storage', function(e){
  if(e.key===CB_KEY){
    loadCB();
    render();
  }
});
// Fallback poll in case the storage event doesn't fire (some browsers are
// inconsistent about firing it reliably in every scenario) -- cheap and quiet.
setInterval(function(){
  loadCB();
  render();
}, 3000);
</script>
</body>
</html>
